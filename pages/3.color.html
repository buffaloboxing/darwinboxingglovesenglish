<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"  charset="UTF-8">
    <title>3. Color Preview</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 750px; margin: 0 auto; }
        .title { font-size: 20px; font-weight: bold; margin: 20px 0; }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 330px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #f9f9f9;
            overflow: hidden;
        }
        .canvas-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #999; font-size: 14px; z-index: 1;
        }
        #canvasContainer { position: relative; width: 100%; height: 100%; }
        #canvasContainer canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        .color-container {
            position: relative; margin-top: 10px; width: 100%;
            display: flex; flex-wrap: wrap; gap: 10px;
        }
        .color-circle {
            width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; box-shadow: 0 0 0 2px transparent;
            transition: all 0.2s;
        }
        .color-circle.selected {
            box-shadow: 0 0 0 2px #07c160, 0 0 0 4px rgba(7, 193, 96, 0.2);
            transform: scale(1.1);
        }
        .current-price { font-size: 16px; font-weight: bold; color: #333; margin: 10px 0; }
        .price-alert { padding: 10px; background: #fff1f0; border: 1px solid #ffa39e; border-radius: 6px; margin: 10px 0; color: #e83e3e; font-size: 14px; display: none; }
        .alert-box { padding: 12px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; margin: 10px 0; color: #e65100; font-size: 14px; }
        .color-rule { font-size: 14px; color: #666; margin: 5px 0; line-height: 1.5; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .prev-btn, .next-btn { flex: 1; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .prev-btn { background: #f5f5f5; color: #333; border: 1px solid #ddd; }
        .next-btn { background: #07c160; color: #fff; border: none; }
        .controls { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 6px; }
        select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin: 10px 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="title">Color Preview (Select Area + Color to Apply)</div>

<div class="current-price">Current Price: $<span id="currentPrice">275</span> / £<span id="currentPriceGBP">210</span></div>
<div class="price-alert" id="priceAlert"></div>

<div class="canvas-container">
    <div class="canvas-placeholder">Glove preview loading...</div>
    <div id="canvasContainer"></div>
</div>

<div id="leatherTip" class="alert-box" style="display: none;"></div>

<div class="color-rules">
    <div class="color-rule">Areas ①, ②, ③: 2 free colors included, +$60/£50 per additional color</div>
    <div class="color-rule">Areas ④, ⑤, ⑥, ⑦, ⑧: 1 extra free color on top of the 2 free base colors, +$40/£30 per additional color</div>
</div>

<div class="controls">
    <div>
        <label>Select Area to Color: </label>
        <select id="areaSelect">
            <option value="1">Area ①</option>
            <option value="2">Area ②</option>
            <option value="3">Area ③</option>
            <option value="4">Area ④</option>
            <option value="5">Area ⑤</option>
            <option value="6">Area ⑥</option>
            <option value="7">Area ⑦</option>
            <option value="8">Area ⑧</option>
        </select>
    </div>
    <div>
        <label>Select Color (Click the color circle): </label>
        <div class="color-container" id="colorContainer"></div>
    </div>
</div>

<div class="btn-group">
    <button class="prev-btn" id="prevBtn">Previous: Select Leather</button>
    <button class="next-btn" id="nextBtn">Next: Custom Hot Stamping/Pattern</button>
</div>

<script>
    /* ==================== Clear color state on first visit ==================== */
    const isFirstVisit = !localStorage.getItem('hasVisitedColorPage');
    if (isFirstVisit) {
        localStorage.removeItem('areaColors');
        localStorage.removeItem('colorExtra');
        localStorage.removeItem('colorExtraGBP');
        localStorage.setItem('hasVisitedColorPage', 'true'); // Mark as visited
    }

    /* ==================== Core Coloring Logic ==================== */
    const TOTAL_LAYERS = 8;
    const CANVAS_SIZE = { w: 1632, h: 1280 };

    const container = document.getElementById('canvasContainer');
    const placeholder = document.querySelector('.canvas-placeholder');
    const areaSelect = document.getElementById('areaSelect');
    const colorContainer = document.getElementById('colorContainer');
    const currentPriceEl = document.getElementById('currentPrice');
    const currentPriceGBPEl = document.getElementById('currentPriceGBP');
    const priceAlert = document.getElementById('priceAlert');
    const leatherTip = document.getElementById('leatherTip');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let basePrice = parseInt(localStorage.getItem('basePrice')) || 275;
    let basePriceGBP = parseInt(localStorage.getItem('basePriceGBP')) || 210;
    let colorExtra = 0;
    let colorExtraGBP = 0;
    const areaColors = { '1': null, '2': null, '3': null, '4': null, '5': null, '6': null, '7': null, '8': null };

    const canvases = [], ctxs = [], images = [], tintedData = [];
    let selectedIdx = 0;

    // Create canvas layers
    for (let i = 0; i < TOTAL_LAYERS; i++) {
        const cvs = document.createElement('canvas');
        cvs.width = CANVAS_SIZE.w;
        cvs.height = CANVAS_SIZE.h;
        cvs.style.zIndex = TOTAL_LAYERS - i;
        container.appendChild(cvs);
        const ctx = cvs.getContext('2d');
        canvases.push(cvs);
        ctxs.push(ctx);
        tintedData.push(null);
    }

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error(`Failed to load: ${src}`));
            img.src = src;
        });
    }

    async function initImages() {
        const promises = [];
        for (let i = 1; i <= TOTAL_LAYERS; i++) {
            promises.push(loadImage(`..\\images\\${i}.png`));
        }
        const loaded = await Promise.all(promises);
        loaded.forEach((img, idx) => {
            images[idx] = img;
            renderLayer(idx); // Draw original image only
        });
        placeholder.style.display = 'none';
    }

    function renderLayer(idx) {
        const ctx = ctxs[idx];
        ctx.clearRect(0, 0, CANVAS_SIZE.w, CANVAS_SIZE.h);
        const img = images[idx];
        ctx.drawImage(img, 0, 0);

        if (tintedData[idx]) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = CANVAS_SIZE.w;
            tempCanvas.height = CANVAS_SIZE.h;
            const tctx = tempCanvas.getContext('2d');
            tctx.drawImage(img, 0, 0);
            const alphaData = tctx.getImageData(0, 0, CANVAS_SIZE.w, CANVAS_SIZE.h);
            const tinted = tintedData[idx];

            for (let i = 0; i < alphaData.data.length; i += 4) {
                if (alphaData.data[i + 3] > 0) {
                    tinted.data[i + 3] = alphaData.data[i + 3];
                } else {
                    tinted.data[i + 3] = 0;
                }
            }
            ctx.putImageData(tinted, 0, 0);
        }
    }

    function tintLayer(idx, colorHex) {
        const ctx = ctxs[idx];
        const img = images[idx];
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, CANVAS_SIZE.w, CANVAS_SIZE.h);
        const data = imageData.data;

        const rTarget = parseInt(colorHex.slice(1, 3), 16);
        const gTarget = parseInt(colorHex.slice(3, 5), 16);
        const bTarget = parseInt(colorHex.slice(5, 7), 16);

        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] === 0) continue;
            const srcR = data[i] / 255;
            const srcG = data[i + 1] / 255;
            const srcB = data[i + 2] / 255;
            data[i] = srcR * rTarget;
            data[i + 1] = srcG * gTarget;
            data[i + 2] = srcB * bTarget;
        }

        tintedData[idx] = imageData;
        renderLayer(idx);
    }

    /* ==================== Color Selection ==================== */
    const colors = [
        { code: '#FFFFFF', name: 'Pure White' }, { code: '#F5F0EB', name: 'Milkshake White' },
        { code: '#9D5F3B', name: 'Gold Brown' }, { code: '#746148', name: 'Elephant Grey' },
        { code: '#1E2E44', name: 'Midnight Blue' }, { code: '#000000', name: 'Black' },
        { code: '#80412D', name: 'Caramel Brown' }, { code: '#3FBF72', name: 'Comic Green' },
        { code: '#B3A59A', name: 'Trench Grey' }, { code: '#F27D3C', name: 'Orange' },
        { code: '#F2C12E', name: 'Sun Yellow' }, { code: '#F9E77F', name: 'Chick Yellow' },
        { code: '#404234', name: 'Olive Green' }, { code: '#BDE0F2', name: 'Breeze Blue' },
        { code: '#A0E7E5', name: 'Tiffany Blue' }, { code: '#0D32C4', name: 'Klein Blue' },
        { code: '#91A3B1', name: 'Linen Blue' }, { code: '#C0A086', name: 'Marrakech Brown' },
        { code: '#828776', name: 'Sage Green' }, { code: '#808080', name: 'Storm Cloud Grey' },
        { code: '#BE3033', name: 'Bright Red' }, { code: '#EEB9C9', name: 'Sakura Pink' },
        { code: '#DF6981', name: 'Rose Pink' }, { code: '#E4A3BB', name: 'Petal Pink' },
        { code: '#6A2A30', name: 'Burgundy' }, { code: '#FFD700', name: 'Lemon Yellow' },
        { code: '#C6AEA6', name: 'Apricot' }, { code: '#294162', name: 'Deep Blue' },
        { code: '#C0C0C0', name: 'Seagull Grey' }, { code: '#402D2D', name: 'Dark Coffee' }
    ];

    function createColorCircles() {
        colorContainer.innerHTML = '';
        colors.forEach(color => {
            const circle = document.createElement('div');
            circle.className = 'color-circle';
            circle.style.backgroundColor = color.code;
            circle.title = color.name;
            circle.dataset.color = color.code;
            circle.onclick = () => {
                document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('selected'));
                circle.classList.add('selected');
                const area = areaSelect.value;
                areaColors[area] = color.code;
                tintLayer(parseInt(area) - 1, color.code);
                calculatePrice();
            };
            colorContainer.appendChild(circle);
        });
    }

    areaSelect.addEventListener('change', () => {
        selectedIdx = parseInt(areaSelect.value) - 1;
        const currentColor = areaColors[areaSelect.value];
        document.querySelectorAll('.color-circle').forEach(el => {
            el.classList.toggle('selected', el.dataset.color === currentColor);
        });
    });

    /* ==================== Price & Tip Logic ==================== */
    function calculatePrice() {
        const leatherType = localStorage.getItem('leatherType') || '';
        const isWildCowhide = leatherType.includes('Wild Cowhide');
        const area123Colors = new Set();
        const area45678Colors = new Set();

        for (let i = 1; i <= 8; i++) {
            const color = areaColors[i];
            if (!color) continue;
            if (isWildCowhide && color === '#80412D') continue;
            if (i <= 3) area123Colors.add(color);
            else area45678Colors.add(color);
        }

        const newColorsIn45678 = new Set();
        area45678Colors.forEach(c => !area123Colors.has(c) && newColorsIn45678.add(c));

        let extra = 0;
        let extraGBP = 0;
        let alertText = '';

        const area123Free = isWildCowhide ? 3 : 2;
        if (area123Colors.size > area123Free) {
            const over = area123Colors.size - area123Free;
            extra += over * 60;
            extraGBP += over * 50;
            alertText += `Areas ①, ②, ③: ${over} extra color(s) used, +$${over*60}/£${over*50}; `;
        }

        const area45678Free = isWildCowhide ? 2 : 1;
        if (newColorsIn45678.size > area45678Free) {
            const over = newColorsIn45678.size - area45678Free;
            extra += over * 40;
            extraGBP += over * 30;
            alertText += `Areas ④, ⑤, ⑥, ⑦, ⑧: ${over} extra color(s) used, +$${over*40}/£${over*30}; `;
        }

        priceAlert.textContent = alertText;
        priceAlert.style.display = alertText ? 'block' : 'none';

        colorExtra = extra;
        colorExtraGBP = extraGBP;
        currentPriceEl.innerText = basePrice + colorExtra;
        currentPriceGBPEl.innerText = basePriceGBP + colorExtraGBP;
        localStorage.setItem('colorExtra', colorExtra);
        localStorage.setItem('colorExtraGBP', colorExtraGBP);
        localStorage.setItem('areaColors', JSON.stringify(areaColors));
    }

    function showLeatherTip() {
        const leatherType = localStorage.getItem('leatherType') || '';
        if (leatherType.includes('Wild Cowhide')) {
            leatherTip.textContent = 'Wild cowhide is fixed to dark brown. You can use dark brown for matching, and it will NOT count towards your 2 free regular cowhide color limit.';
            leatherTip.style.display = 'block';
        } else if (/Shark|Crocodile|Ostrich|Lizard|Python/.test(leatherType)) {
            leatherTip.textContent = 'Exotic leathers (Crocodile/Shark/Ostrich/Lizard/Python) do not have a color chart. Common colors like black, brown, white are available. You can use similar colors from the chart for preview, and we will confirm with actual leather photos. These exotic leathers are fixed for areas ② and ⑤; contact us for quotes if you want to use them in other areas.';
            leatherTip.style.display = 'block';
        } else {
            leatherTip.style.display = 'none';
        }
    }

    /* ==================== Navigation ==================== */
    prevBtn.onclick = () => { window.location.href = '2.leather.html'; };
    nextBtn.onclick = () => {
        localStorage.setItem('areaColors', JSON.stringify(areaColors));
        localStorage.setItem('colorExtra', colorExtra);
        localStorage.setItem('colorExtraGBP', colorExtraGBP);
        window.location.href = '4.customize.html';
    };

    /* ==================== Initialization ==================== */
    // Restore colors (if not first visit)
    const saved = localStorage.getItem('areaColors');
    if (saved && !isFirstVisit) {
        Object.assign(areaColors, JSON.parse(saved));
    }

    initImages().then(() => {
        createColorCircles();
        showLeatherTip();

        // Restore coloring (if not first visit)
        if (saved && !isFirstVisit) {
            setTimeout(() => {
                Object.keys(areaColors).forEach(area => {
                    const color = areaColors[area];
                    if (color) tintLayer(parseInt(area) - 1, color);
                });
                calculatePrice();
            }, 100);
        } else {
            calculatePrice(); // First visit: price = basePrice
        }
    }).catch(err => {
        console.error(err);
        placeholder.textContent = 'Image load failed. Please ensure 1.png ~ 8.png exist in the images folder.';
    });
</script>
</body>
</html>
